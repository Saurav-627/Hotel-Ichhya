# ============================================================
# SEO Page Data — per-page meta tags AND banner defaults
# Each entry is keyed by "path" (exact URL match)
# header_* fields are the hero banner defaults for that page.
# ============================================================
seo_data:
  - path: "/"
    meta_title: "Hotel Ichchha | 5-Star Luxury Resort in Bara, Nepal"
    meta_description: "Book rooms at Hotel Ichchha in Simara, Bara, Nepal. Explore our premium chambers, fine dining restaurants, spas, and conference packages."
    twitter_card: "summary_large_image"
    structured_data: '{"@context":"https://schema.org","@type":"Hotel","name":"Hotel Ichchha","address":{"@type":"PostalAddress","streetAddress":"Simara","addressLocality":"Bara","addressCountry":"NP"},"starRating":{"@type":"Rating","ratingValue":"5"}}'

  - path: "/rooms/"
    meta_title: "Rooms & Accommodation | Hotel Ichchha"
    meta_description: "Browse our premium rooms and suites at Hotel Ichchha. Deluxe, Executive, Honeymoon, and more. Book directly for the best rates."
    header_subtitle: "Sanctuary Suites"
    header_title: "Rooms & Accommodation"
    header_description: "Explore our premium selection of spaces crafted with an eye for elegance and class."

  - path: "/dining/"
