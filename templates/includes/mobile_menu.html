<!-- MOBILE SIDE MENU -->
<div x-show="mobileMenuOpen" class="fixed inset-0 z-50 flex md:hidden" style="display: none;">
    <!-- Backdrop -->
    <div x-show="mobileMenuOpen" 
         x-transition:enter="transition-opacity ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="mobileMenuOpen = false" 
         class="fixed inset-0 bg-black/60 backdrop-blur-sm"></div>

    <!-- Sidebar Panel -->
    <div x-show="mobileMenuOpen"
         x-transition:enter="transition ease-in-out duration-300 transform"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in-out duration-200 transform"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="relative ml-auto flex h-full w-full max-w-xs flex-col overflow-y-auto py-4 pb-12 shadow-xl border-l"
         :class="{
             'bg-white border-gray-200 text-gray-800': currentTheme === 'light',
             'bg-[#121212] border-[#2D2D2D] text-gray-200': currentTheme === 'dark',
             'bg-[#0A0908] border-amber-900/30 text-amber-200': currentTheme === 'luxury' || currentTheme === 'festival'
         }">
        <div class="flex items-center justify-between px-4 pb-6 border-b" :class="{ 'border-gray-200': currentTheme === 'light', 'border-amber-900/20': currentTheme !== 'light' }">
            <span class="font-luxury-title text-xl font-bold tracking-wider">Navigation</span>
            <button @click="mobileMenuOpen = false" class="p-2 rounded-lg hover:bg-luxuryGold-900/10">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="mt-4 px-4 space-y-3">
            <a href="{% url 'homepage:home' %}" data-nav-mobile class="block py-2 text-base font-medium border-b border-transparent hover:text-luxuryGold-400">Home</a>
            
            {% for item in header_menu %}
                <a href="{{ item.url }}" data-nav-mobile class="block py-2 text-base font-medium border-b border-transparent hover:text-luxuryGold-400">{{ item.name }}</a>
            {% empty %}
                <a href="{% url 'rooms:room_list' %}" class="block py-2 text-base font-medium hover:text-luxuryGold-400">Rooms & Suites</a>
                <a href="{% url 'dining:dining_list' %}" class="block py-2 text-base font-medium hover:text-luxuryGold-400">Dining</a>
                <a href="{% url 'recreation:recreation_list' %}" class="block py-2 text-base font-medium hover:text-luxuryGold-400">Recreation</a>
                <a href="{% url 'conference:venue_list' %}" class="block py-2 text-base font-medium hover:text-luxuryGold-400">Events</a>
                <a href="{% url 'gallery:gallery_list' %}" class="block py-2 text-base font-medium hover:text-luxuryGold-400">Gallery</a>
                <a href="{% url 'blogs:blog_list' %}" class="block py-2 text-base font-medium hover:text-luxuryGold-400">News</a>
                <a href="{% url 'contact:contact_page' %}" class="block py-2 text-base font-medium hover:text-luxuryGold-400">Contact</a>
            {% endfor %}

            <div class="pt-6 border-t mt-6" :class="{ 'border-gray-200': currentTheme === 'light', 'border-amber-900/20': currentTheme !== 'light' }">
                <h4 class="text-xs font-semibold tracking-widest uppercase mb-3 opacity-60">Currency</h4>
                <div class="relative">
                    <select @change="setCurrency($event.target.value)" 
                            class="w-full appearance-none px-3 py-2.5 text-xs rounded border bg-transparent focus:outline-none focus:ring-1 focus:ring-luxuryGold-400 font-medium"
                            :class="currentTheme === 'light' ? 'border-gray-300 text-gray-800 bg-white' : 'border-amber-900/40 text-amber-200 bg-[#161412]'">
                        {% for c in published_currencies %}
                            <option value="{{ c.iso_code }}" {% if c.iso_code == selected_currency %}selected{% endif %} :selected="currentCurrency === '{{ c.iso_code }}'">{{ c.name }} ({{ c.iso_code }})</option>
                        {% empty %}
                            <option value="USD" {% if selected_currency == 'USD' %}selected{% endif %} :selected="currentCurrency === 'USD'">US Dollar (USD)</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-luxuryGold-500">
                        <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <a href="{% url 'rooms:room_list' %}" class="block text-center w-full py-3 text-sm font-semibold uppercase tracking-wider rounded-lg border border-luxuryGold-400 {% if selected_theme == 'light' %}bg-amber-800 text-white{% else %}bg-luxuryGold-500 text-black{% endif %}"
                   :class="{
                       'bg-amber-800 text-white': currentTheme === 'light',
                       'bg-luxuryGold-500 text-black': currentTheme !== 'light'
                   }">
                    Book A Stay
                </a>
            </div>
        </div>
    </div>
</div>
