version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hotel_ichchha_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hotel_ichchha
      - POSTGRES_USER=ichchha_user
      - POSTGRES_PASSWORD=ichchha_secure_pass_2026
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ichchha_user -d hotel_ichchha"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotel_ichchha_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: hotel_ichchha_web
    command: >
      bash -c "python manage.py migrate &&
               python manage.py collectstatic --noinput &&
               gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-insecure-luxury-hotel-secret-key-2026
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://ichchha_user:ichchha_secure_pass_2026@db:5432/hotel_ichchha
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: hotel_ichchha_celery
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - SECRET_KEY=django-insecure-luxury-hotel-secret-key-2026
      - DEBUG=True
      - DATABASE_URL=postgres://ichchha_user:ichchha_secure_pass_2026@db:5432/hotel_ichchha
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
