hotel_settings:
  site_name: "Hotel Ichchha"
  theme: "luxury"
  contact_phone: "+977-51-590011"
  contact_email: "concierge@hotelichchha.com"
  address: "Simara, Bara, Nepal"
  about_text: "Hotel Ichchha is a premier 5-star sanctuary located in the heart of Simara, Bara. Designed to blend modern grandeur with warm Nepalese hospitality, we provide luxury chambers, elite wellness spas, fine dining lounges, and world-class conference facilities."
  copyright_text: "&copy; 2026 Hotel Ichchha Resort. All Rights Reserved."
  facebook_url: "https://facebook.com"
  instagram_url: "https://instagram.com"
  twitter_url: "https://twitter.com"

currencies:
  - iso_code: "USD"
    name: "US Dollar"
    symbol: "$"
    is_published: true
    sequence: 1
    is_custom: false
  - iso_code: "NPR"
    name: "Nepalese Rupee"
    symbol: "₨"
    is_published: true
    sequence: 2
    is_custom: false
  - iso_code: "EUR"
    name: "Euro"
    symbol: "€"
    is_published: true
    sequence: 3
    is_custom: false
  - iso_code: "GBP"
    name: "British Pound"
    symbol: "£"
    is_published: true
    sequence: 4
    is_custom: false

